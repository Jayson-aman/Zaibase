<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <clipPath id="rounded">
      <rect width="1200" height="1200" rx="240" ry="240"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" rx="240" fill="url(#bgGrad)"/>

  <!-- Subtle pattern overlay -->
  <g opacity="0.06" clip-path="url(#rounded)">
    <circle cx="200" cy="200" r="280" fill="#fff"/>
    <circle cx="1000" cy="1000" r="280" fill="#fff"/>
    <circle cx="1050" cy="150" r="180" fill="#fff"/>
    <circle cx="150" cy="1050" r="180" fill="#fff"/>
  </g>

  <!-- House/building icon (top) -->
  <g transform="translate(600, 290)" filter="url(#shadow)">
    <!-- Roof -->
    <polygon points="-160,-90 0,-220 160,-90" fill="url(#goldGrad)" stroke="none"/>
    <!-- Chimney -->
    <rect x="70" y="-220" width="28" height="60" rx="4" fill="url(#goldGrad)"/>
    <!-- Building body -->
    <rect x="-120" y="-90" width="240" height="170" rx="8" fill="#fff" opacity="0.95"/>
    <!-- Door -->
    <rect x="-28" y="-10" width="56" height="90" rx="8" fill="url(#goldGrad)"/>
    <!-- Windows left -->
    <rect x="-98" y="-60" width="44" height="40" rx="6" fill="url(#goldGrad)" opacity="0.7"/>
    <!-- Windows right -->
    <rect x="54" y="-60" width="44" height="40" rx="6" fill="url(#goldGrad)" opacity="0.7"/>
  </g>

  <!-- 宅建 main text -->
  <text
    x="600" y="660"
    font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', sans-serif"
    font-size="320"
    font-weight="900"
    text-anchor="middle"
    fill="#ffffff"
    filter="url(#textShadow)"
    letter-spacing="-8"
  >宅建</text>

  <!-- Separator line -->
  <rect x="180" y="700" width="840" height="4" rx="2" fill="url(#goldGrad)" opacity="0.7"/>

  <!-- 士 (small) and subtitle -->
  <text
    x="600" y="790"
    font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', sans-serif"
    font-size="72"
    font-weight="700"
    text-anchor="middle"
    fill="#BFDBFE"
    letter-spacing="12"
  >宅地建物取引士</text>

  <!-- Zaibase branding -->
  <text
    x="600" y="900"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="58"
    font-weight="300"
    text-anchor="middle"
    fill="#93C5FD"
    letter-spacing="8"
  >by ZAIBASE</text>

  <!-- Bottom badge -->
  <rect x="380" y="960" width="440" height="72" rx="36" fill="#ffffff" opacity="0.12"/>
  <text
    x="600" y="1007"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="36"
    font-weight="700"
    text-anchor="middle"
    fill="#ffffff"
    letter-spacing="4"
  >試験対策アプリ</text>
</svg>
