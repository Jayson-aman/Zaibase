<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zaibase - Construction Materials & Workforce Platform</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; max-width: 480px; margin: 0 auto; min-height: 100vh; }
    .hidden { display: none !important; }
    #loginScreen { background: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
    .logo { font-size: 38px; font-weight: 700; color: #185FA5; letter-spacing: -1px; margin-bottom: 4px; }
    .logo-sub { font-size: 13px; color: #888; margin-bottom: 6px; text-align: center; }
    .logo-tag { font-size: 12px; color: #185FA5; background: #E6F1FB; padding: 4px 12px; border-radius: 20px; margin-bottom: 36px; }
    .input-group { width: 100%; margin-bottom: 12px; }
    .input-group input { width: 100%; padding: 14px 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; outline: none; }
    .input-group input:focus { border-color: #185FA5; }
    .btn-primary { width: 100%; padding: 14px; background: #185FA5; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 500; cursor: pointer; margin-bottom: 10px; }
    .btn-secondary { width: 100%; padding: 14px; background: #fff; color: #185FA5; border: 1.5px solid #185FA5; border-radius: 10px; font-size: 16px; font-weight: 500; cursor: pointer; }
    .divider { width: 100%; text-align: center; color: #bbb; font-size: 13px; margin: 12px 0; }
    .error-msg { color: #e53935; font-size: 13px; margin-top: 8px; text-align: center; }
    .lang-btn { margin-top: 20px; font-size: 12px; color: #888; background: none; border: 1px solid #ddd; border-radius: 20px; padding: 6px 16px; cursor: pointer; }
    #mainScreen { background: #f5f5f5; min-height: 100vh; padding-bottom: 70px; }
    .header { background: #185FA5; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .header-title { color: #fff; font-size: 20px; font-weight: 700; }
    .header-sub { color: #B5D4F4; font-size: 10px; }
    .logout-btn { color: #B5D4F4; font-size: 12px; background: none; border: none; cursor: pointer; }
    .feature-tabs { display: flex; margin: 8px 16px 4px; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .feature-tab { flex: 1; padding: 8px 4px; font-size: 10px; text-align: center; cursor: pointer; color: #888; border: none; background: none; }
    .feature-tab.active { background: #185FA5; color: #fff; font-weight: 600; }
    .search-box { margin: 8px 16px; background: #fff; border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .search-box input { flex: 1; border: none; outline: none; font-size: 14px; }
    .category-scroll { display: flex; gap: 8px; padding: 4px 16px 10px; overflow-x: auto; scrollbar-width: none; }
    .category-scroll::-webkit-scrollbar { display: none; }
    .cat-btn { padding: 5px 12px; border-radius: 20px; border: 1.5px solid #ddd; background: #fff; font-size: 12px; white-space: nowrap; cursor: pointer; color: #555; }
    .cat-btn.active { background: #185FA5; color: #fff; border-color: #185FA5; }
    .section-title { font-size: 12px; color: #888; font-weight: 500; padding: 0 16px 8px; }
    .listings { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
    .item-card { background: #fff; border-radius: 12px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .item-card-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .item-title { font-size: 15px; font-weight: 500; color: #1a1a1a; flex: 1; }
    .item-price { font-size: 15px; font-weight: 600; color: #185FA5; margin-left: 8px; }
    .item-meta { font-size: 12px; color: #999; margin-bottom: 6px; }
    .item-desc { font-size: 13px; color: #555; line-height: 1.5; }
    .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; margin-right: 4px; }
    .badge-sell { background: #EAF3DE; color: #3B6D11; }
    .badge-swap { background: #EEEDFE; color: #3C3289; }
    .badge-rent { background: #FAEEDA; color: #854F0B; }
    .badge-delivery { background: #E6F1FB; color: #185FA5; }
    .badge-worker { background: #FCE4D6; color: #C55A11; }
    .empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    #postScreen { background: #f5f5f5; min-height: 100vh; padding-bottom: 30px; }
    .post-header { background: #185FA5; padding: 16px; display: flex; align-items: center; gap: 12px; }
    .back-btn { color: #fff; background: none; border: none; font-size: 22px; cursor: pointer; }
    .post-header-title { color: #fff; font-size: 18px; font-weight: 600; }
    .post-form { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .form-group { background: #fff; border-radius: 12px; padding: 14px; }
    .form-group label { font-size: 12px; color: #888; font-weight: 500; display: block; margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; border: none; outline: none; font-size: 15px; color: #1a1a1a; background: transparent; }
    .form-group textarea { resize: none; height: 80px; line-height: 1.6; }
    .type-selector { display: flex; gap: 6px; flex-wrap: wrap; }
    .type-btn { flex: 1; min-width: 70px; padding: 8px 4px; border: 1.5px solid #ddd; border-radius: 8px; background: #fff; font-size: 11px; cursor: pointer; text-align: center; color: #666; }
    .type-btn.sel { border-color: #185FA5; background: #E6F1FB; color: #185FA5; font-weight: 500; }
    .currency-row { display: flex; align-items: center; gap: 8px; }
    .currency-sel { width: 90px; border: 1px solid #ddd; border-radius: 8px; padding: 8px; font-size: 13px; background: #f9f9f9; outline: none; }
    .post-submit-btn { background: #185FA5; color: #fff; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer; margin: 0 16px; width: calc(100% - 32px); }
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #fff; border-top: 1px solid #eee; display: flex; padding: 8px 0 6px; z-index: 200; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 9px; color: #aaa; cursor: pointer; border: none; background: none; }
    .nav-item.active { color: #185FA5; }
    .nav-icon { font-size: 20px; }
    .loading { text-align: center; padding: 30px; color: #bbb; font-size: 14px; }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="logo">Zaibase</div>
  <div class="logo-sub">Construction Materials & Workforce Platform</div>
  <div class="logo-tag">🌍 Connect. Build. Share.</div>
  <div class="input-group"><input type="email" id="email" placeholder="Email address"></div>
  <div class="input-group"><input type="password" id="password" placeholder="Password (min. 6 characters)"></div>
  <button class="btn-primary" id="loginBtn">Log In</button>
  <div class="divider">or</div>
  <button class="btn-secondary" id="signupBtn">Create Account</button>
  <div class="error-msg" id="authError"></div>
  <button class="lang-btn" onclick="location.href='Zaibase.html'">🇯🇵 日本語版はこちら</button>
</div>

<div id="mainScreen" class="hidden">
  <div class="header">
    <div><div class="header-title">Zaibase</div><div class="header-sub">Connect. Build. Share.</div></div>
    <button class="logout-btn" id="logoutBtn">Sign Out</button>
  </div>
  <div class="feature-tabs">
    <button class="feature-tab active">📦 Materials</button>
    <button class="feature-tab">🔧 Tools</button>
    <button class="feature-tab">🚛 Transport</button>
    <button class="feature-tab">👷 Workers</button>
  </div>
  <div class="search-box"><span>🔍</span><input type="text" id="searchInput" placeholder="Search materials, tools, workers..."></div>
  <div class="category-scroll">
    <button class="cat-btn active" data-cat="all">All</button>
    <button class="cat-btn" data-cat="Formwork">Formwork</button>
    <button class="cat-btn" data-cat="Power Tools">Power Tools</button>
    <button class="cat-btn" data-cat="Civil">Civil</button>
    <button class="cat-btn" data-cat="Safety">Safety</button>
    <button class="cat-btn" data-cat="Steel">Steel</button>
    <button class="cat-btn" data-cat="Other">Other</button>
  </div>
  <div class="section-title">Listings Near You</div>
  <div class="listings" id="listingsContainer"><div class="loading">Loading...</div></div>
  <div class="bottom-nav">
    <button class="nav-item active" id="navHome"><span class="nav-icon">🏠</span>Home</button>
    <button class="nav-item" id="navMap"><span class="nav-icon">🗺️</span>Map</button>
    <button class="nav-item" id="navPost"><span class="nav-icon">➕</span>Post</button>
    <button class="nav-item" id="navChat"><span class="nav-icon">💬</span>Chat</button>
    <button class="nav-item" id="navMyPage"><span class="nav-icon">👤</span>Profile</button>
  </div>
</div>

<div id="postScreen" class="hidden">
  <div class="post-header">
    <button class="back-btn" id="backBtn">←</button>
    <div class="post-header-title">Post a Listing</div>
  </div>
  <div class="post-form">
    <div class="form-group">
      <label>Listing Type</label>
      <div class="type-selector">
        <button class="type-btn sel" data-type="sell">💰 Sale</button>
        <button class="type-btn" data-type="swap">🔄 Swap</button>
        <button class="type-btn" data-type="rent">📅 Rent</button>
        <button class="type-btn" data-type="delivery">🚛 Transport</button>
        <button class="type-btn" data-type="worker">👷 Worker</button>
      </div>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="itemCategory">
        <option value="Formwork">Formwork / Scaffolding</option>
        <option value="Power Tools">Power Tools</option>
        <option value="Civil">Civil Materials</option>
        <option value="Safety">Safety Equipment</option>
        <option value="Steel">Steel (Mill Certificate required)</option>
        <option value="Heavy Equipment">Heavy Equipment / Crane</option>
        <option value="Soil">Fill Soil (Certificate required)</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Item Name / Job Title</label>
      <input type="text" id="itemTitle" placeholder="e.g. Traffic Cones x50, Carpenter needed">
    </div>
    <div class="form-group">
      <label>Price / Day Rate</label>
      <div class="currency-row">
        <select class="currency-sel" id="currency">
          <option value="USD">USD $</option>
          <option value="JPY">JPY ¥</option>
          <option value="EUR">EUR €</option>
          <option value="AUD">AUD $</option>
          <option value="SGD">SGD $</option>
          <option value="AED">AED</option>
        </select>
        <input type="number" id="itemPrice" placeholder="0.00" style="flex:1">
      </div>
    </div>
    <div class="form-group">
      <label>Details / Requirements</label>
      <textarea id="itemDesc" placeholder="Condition, quantity, size, certifications required..."></textarea>
    </div>
  </div>
  <button class="post-submit-btn" id="postBtn">📤 Post Listing</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAw1jXRX9thcqfrqiB1Is81BIkpGkLcPT0",
    authDomain: "zaisai-share.firebaseapp.com",
    projectId: "zaisai-share",
    storageBucket: "zaisai-share.firebasestorage.app",
    messagingSenderId: "1091454412524",
    appId: "1:1091454412524:web:e1d525169a884f2028e7c9",
    measurementId: "G-H1LDV3CWGS"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let currentCategory = 'all';
  let selectedType = 'sell';

  function showScreen(id) {
    ['loginScreen','mainScreen','postScreen'].forEach(s => document.getElementById(s).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
  }

  onAuthStateChanged(auth, user => {
    if (user) { showScreen('mainScreen'); loadListings(); }
    else { showScreen('loginScreen'); }
  });

  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('authError');
    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Please enter email and password'; return; }
    try { await signInWithEmailAndPassword(auth, email, password); }
    catch(e) { errEl.textContent = 'Login failed. Please check your credentials.'; }
  });

  document.getElementById('signupBtn').addEventListener('click', async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('authError');
    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Please enter email and password'; return; }
    if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters'; return; }
    try { await createUserWithEmailAndPassword(auth, email, password); }
    catch(e) {
      if (e.code === 'auth/email-already-in-use') errEl.textContent = 'This email is already registered';
      else errEl.textContent = 'Registration failed: ' + e.message;
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
  document.getElementById('navPost').addEventListener('click', () => showScreen('postScreen'));
  document.getElementById('backBtn').addEventListener('click', () => { showScreen('mainScreen'); loadListings(); });
  document.getElementById('navHome').addEventListener('click', () => { showScreen('mainScreen'); loadListings(); });

  document.querySelectorAll('.cat-btn').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCategory = btn.dataset.cat;
    loadListings();
  }));

  document.querySelectorAll('.type-btn').forEach(btn => btn.addEventListener('click', () => {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('sel'));
    btn.classList.add('sel');
    selectedType = btn.dataset.type;
  }));

  document.getElementById('searchInput').addEventListener('input', () => loadListings());

  document.getElementById('postBtn').addEventListener('click', async () => {
    const title = document.getElementById('itemTitle').value.trim();
    const category = document.getElementById('itemCategory').value;
    const price = document.getElementById('itemPrice').value;
    const currency = document.getElementById('currency').value;
    const desc = document.getElementById('itemDesc').value.trim();
    if (!title) { alert('Please enter an item name'); return; }
    const btn = document.getElementById('postBtn');
    btn.textContent = 'Posting...'; btn.disabled = true;
    try {
      await addDoc(collection(db, 'listings'), {
        title, category, tradeType: selectedType,
        price: price ? Number(price) : null,
        currency, desc,
        userId: auth.currentUser.uid,
        lang: 'en',
        createdAt: serverTimestamp()
      });
      alert('✅ Posted successfully!');
      document.getElementById('itemTitle').value = '';
      document.getElementById('itemPrice').value = '';
      document.getElementById('itemDesc').value = '';
      showScreen('mainScreen'); loadListings();
    } catch(e) { alert('Failed to post: ' + e.message); }
    finally { btn.textContent = '📤 Post Listing'; btn.disabled = false; }
  });

  async function loadListings() {
    const container = document.getElementById('listingsContainer');
    container.innerHTML = '<div class="loading">Loading...</div>';
    const searchText = document.getElementById('searchInput').value.trim().toLowerCase();
    try {
      const snap = await getDocs(query(collection(db, 'listings'), orderBy('createdAt', 'desc')));
      container.innerHTML = '';
      let count = 0;
      snap.forEach(doc => {
        const d = doc.data();
        if (currentCategory !== 'all' && d.category !== currentCategory) return;
        if (searchText && !d.title.toLowerCase().includes(searchText) && !(d.desc||'').toLowerCase().includes(searchText)) return;
        const labels = { sell: 'For Sale', swap: 'Swap', rent: 'Rental', delivery: 'Transport', worker: 'Worker' };
        const symbols = { USD:'$', JPY:'¥', EUR:'€', AUD:'A$', SGD:'S$', AED:'د.إ' };
        const sym = symbols[d.currency] || '$';
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
          <div class="item-card-top">
            <div class="item-title">${d.title}</div>
            ${d.price ? `<div class="item-price">${sym}${d.price.toLocaleString()}</div>` : ''}
          </div>
          <div class="item-meta">
            <span class="badge badge-${d.tradeType}">${labels[d.tradeType]||d.tradeType}</span>${d.category||''}
          </div>
          ${d.desc ? `<div class="item-desc">${d.desc}</div>` : ''}
        `;
        container.appendChild(card);
        count++;
      });
      if (count === 0) container.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><p>No listings yet.<br>Be the first to post!</p></div>';
    } catch(e) { container.innerHTML = '<div class="loading">Failed to load listings</div>'; }
  }
</script>
</body>
</html>
