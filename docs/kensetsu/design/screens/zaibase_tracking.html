<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>搬入車両追跡 — Zaibase</title>
<style>
  :root{--navy:#1a3c5e;--orange:#e8a020;--bg:#f4f6f8;--card:#fff;
    --text:#1a2332;--muted:#6b7c93;--border:#dce3ea;--green:#1d9e75;--red:#e24b4a;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
    background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

  /* ── ヘッダー ── */
  header{background:var(--navy);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;z-index:20;}
  .back{color:rgba(255,255,255,.7);font-size:22px;cursor:pointer;}
  .hd-title{color:#fff;font-size:16px;font-weight:700;margin:0 auto;}
  .hd-live{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:#4ade80;}
  .live-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:pulse 1.4s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* ── 地図（メイン） ── */
  #map{flex:1;background:#c8d8e8;position:relative;overflow:hidden;}

  /* 地図背景（擬似マップ） */
  .map-bg{position:absolute;inset:0;
    background:
      repeating-linear-gradient(0deg,rgba(255,255,255,.08) 0,rgba(255,255,255,.08) 1px,transparent 1px,transparent 60px),
      repeating-linear-gradient(90deg,rgba(255,255,255,.08) 0,rgba(255,255,255,.08) 1px,transparent 1px,transparent 60px),
      linear-gradient(135deg,#b8cdd8 0%,#a0b8c8 40%,#8aabbc 100%);}

  /* 道路 */
  .road-h{position:absolute;height:10px;background:#d4c89a;border-top:1px solid #c4b88a;border-bottom:1px solid #c4b88a;}
  .road-v{position:absolute;width:10px;background:#d4c89a;border-left:1px solid #c4b88a;border-right:1px solid #c4b88a;}

  /* 現場ピン */
  .site-pin{position:absolute;transform:translate(-50%,-100%);z-index:10;cursor:pointer;}
  .site-pin .pin-icon{font-size:36px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));}
  .site-pin .pin-label{background:var(--navy);color:#fff;font-size:10px;font-weight:700;
    padding:3px 7px;border-radius:8px;white-space:nowrap;margin-top:2px;text-align:center;}

  /* 車両マーカー */
  .truck-marker{position:absolute;transform:translate(-50%,-50%);z-index:15;
    cursor:pointer;transition:left .8s ease, top .8s ease;}
  .truck-inner{background:var(--orange);border-radius:50%;width:44px;height:44px;
    display:flex;align-items:center;justify-content:center;
    border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);}
  .truck-inner i{font-size:22px;color:#fff;}
  .truck-label{background:rgba(26,60,94,.9);color:#fff;font-size:10px;font-weight:700;
    padding:3px 8px;border-radius:6px;white-space:nowrap;margin-top:4px;text-align:center;}
  .truck-eta{background:var(--green);color:#fff;font-size:10px;font-weight:700;
    padding:2px 7px;border-radius:5px;margin-top:2px;text-align:center;}

  /* ルートライン（SVG） */
  #route-svg{position:absolute;inset:0;pointer-events:none;z-index:5;}

  /* ── 下パネル ── */
  .bottom-panel{background:var(--card);border-top:1px solid var(--border);
    flex-shrink:0;z-index:20;max-height:55dvh;overflow-y:auto;}

  /* ETAバー */
  .eta-bar{background:var(--navy);padding:10px 16px;
    display:flex;align-items:center;justify-content:space-between;}
  .eta-left{display:flex;align-items:center;gap:8px;}
  .eta-icon{font-size:20px;color:var(--orange);}
  .eta-title{color:#fff;font-size:13px;font-weight:700;}
  .eta-sub{color:rgba(255,255,255,.65);font-size:11px;}
  .eta-time{font-size:22px;font-weight:800;color:#4ade80;}
  .eta-unit{font-size:12px;color:rgba(255,255,255,.65);margin-left:2px;}

  /* 車両リスト */
  .vehicle-list{padding:10px 14px;}
  .vehicle-item{display:flex;align-items:center;gap:10px;padding:10px;
    border-radius:10px;margin-bottom:8px;cursor:pointer;transition:.15s;
    border:1px solid var(--border);}
  .vehicle-item.active{border-color:var(--orange);background:#fffbf2;}
  .vi-avatar{width:40px;height:40px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:18px;
    flex-shrink:0;border:2px solid var(--border);}
  .vi-avatar.moving{border-color:var(--green);background:#e8f8f2;}
  .vi-avatar.waiting{border-color:var(--orange);background:#fff8e0;}
  .vi-avatar.arrived{border-color:var(--navy);background:#e8f0fa;}
  .vi-info{flex:1;min-width:0;}
  .vi-name{font-size:13px;font-weight:700;margin-bottom:2px;}
  .vi-meta{font-size:11px;color:var(--muted);}
  .vi-right{text-align:right;flex-shrink:0;}
  .vi-eta{font-size:14px;font-weight:800;color:var(--navy);}
  .vi-status{font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;margin-top:2px;}
  .s-moving {background:#e8f8f2;color:var(--green);}
  .s-waiting{background:#fff8e0;color:#7a5a00;}
  .s-arrived{background:#e8f0fa;color:var(--navy);}
  .s-late   {background:#fde8e8;color:var(--red);}

  /* 通知ボタン */
  .notify-row{display:flex;gap:8px;padding:0 14px 12px;}
  .noti-btn{flex:1;padding:11px;border-radius:9px;font-size:13px;font-weight:700;
    border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
  .noti-btn.line  {background:#06c755;color:#fff;}
  .noti-btn.sms   {background:var(--navy);color:#fff;}
  .noti-btn.guard {background:#fff3e0;color:#7a5a00;border:1px solid #f5d86e;}

  /* ── ドライバー送信画面 ── */
  .driver-send{display:none;position:fixed;inset:0;background:var(--bg);z-index:100;
    flex-direction:column;padding:20px;}
  .driver-send.show{display:flex;}
  .ds-title{font-size:18px;font-weight:800;color:var(--navy);margin-bottom:6px;text-align:center;}
  .ds-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:20px;line-height:1.6;}
  .ds-btn{width:100%;padding:16px;border-radius:12px;font-size:16px;font-weight:800;
    border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;}
  .ds-btn.primary{background:var(--navy);color:#fff;}
  .ds-btn.line   {background:#06c755;color:#fff;}
  .ds-btn.sms    {background:var(--orange);color:#fff;}
  .ds-cancel{text-align:center;color:var(--muted);font-size:13px;cursor:pointer;
    text-decoration:underline;padding:8px;}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
    background:var(--text);color:#fff;padding:11px 20px;border-radius:22px;
    font-size:13px;font-weight:500;transition:transform .3s;z-index:200;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

<header>
  <span class="back" onclick="history.back()"><i class="ti ti-arrow-left"></i></span>
  <span class="hd-title">搬入車両 リアルタイム追跡</span>
  <div class="hd-live">
    <div class="live-dot"></div>LIVE
  </div>
</header>

<!-- 地図エリア -->
<div id="map">
  <div class="map-bg"></div>

  <!-- 道路 -->
  <div class="road-h" style="top:45%;left:0;right:0"></div>
  <div class="road-h" style="top:70%;left:0;right:0"></div>
  <div class="road-v" style="left:30%;top:0;bottom:0"></div>
  <div class="road-v" style="left:65%;top:0;bottom:0"></div>

  <!-- ルートSVG -->
  <svg id="route-svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrowhead" viewBox="0 0 10 10" refX="8" refY="5"
        markerWidth="5" markerHeight="5" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--orange)" opacity=".8"/>
      </marker>
    </defs>
    <polyline id="route-line1" points=""
      fill="none" stroke="#e8a020" stroke-width="4" stroke-dasharray="8 5"
      opacity=".7" marker-mid="url(#arrowhead)" stroke-linecap="round"/>
    <polyline id="route-line2" points=""
      fill="none" stroke="#1a3c5e" stroke-width="3" stroke-dasharray="6 4"
      opacity=".5" stroke-linecap="round"/>
  </svg>

  <!-- 現場ピン -->
  <div class="site-pin" id="site-pin" style="left:65%;top:45%">
    <div class="pin-icon">🏗️</div>
    <div class="pin-label">現場（横浜市中区）</div>
  </div>

  <!-- 車両マーカー1（走行中） -->
  <div class="truck-marker" id="truck1" style="left:20%;top:60%">
    <div class="truck-inner"><i class="ti ti-truck-delivery"></i></div>
    <div class="truck-label">山田運輸 10t</div>
    <div class="truck-eta">あと12分</div>
  </div>

  <!-- 車両マーカー2（待機中） -->
  <div class="truck-marker" id="truck2" style="left:82%;top:75%">
    <div class="truck-inner" style="background:var(--navy)"><i class="ti ti-truck"></i></div>
    <div class="truck-label">佐藤物流 4t</div>
    <div class="truck-eta" style="background:var(--orange)">待機中</div>
  </div>

  <!-- ズームボタン -->
  <div style="position:absolute;right:12px;top:12px;display:flex;flex-direction:column;gap:4px;z-index:15;">
    <button style="width:36px;height:36px;background:var(--card);border:1px solid var(--border);
      border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;"
      onclick="showToast('ズームイン')">+</button>
    <button style="width:36px;height:36px;background:var(--card);border:1px solid var(--border);
      border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;"
      onclick="showToast('ズームアウト')">−</button>
  </div>

  <!-- ドライバーへの追跡リンク送信ボタン -->
  <button style="position:absolute;left:12px;bottom:12px;background:var(--navy);color:#fff;
    border:none;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;
    cursor:pointer;display:flex;align-items:center;gap:7px;z-index:15;box-shadow:0 2px 8px rgba(0,0,0,.25);"
    onclick="showDriverSend()">
    <i class="ti ti-share"></i>追跡リンクを送る
  </button>
</div>

<!-- 下パネル -->
<div class="bottom-panel">

  <!-- ETAバー -->
  <div class="eta-bar">
    <div class="eta-left">
      <div class="eta-icon"><i class="ti ti-truck-delivery"></i></div>
      <div>
        <div class="eta-title">山田運輸 タイル材料</div>
        <div class="eta-sub">横浜市中区 方向に走行中</div>
      </div>
    </div>
    <div>
      <span class="eta-time" id="eta-countdown">12</span>
      <span class="eta-unit">分後到着</span>
    </div>
  </div>

  <!-- 車両リスト -->
  <div class="vehicle-list">
    <div class="vehicle-item active" onclick="focusTruck(1)">
      <div class="vi-avatar moving"><i class="ti ti-truck-delivery"></i></div>
      <div class="vi-info">
        <div class="vi-name">山田運輸 — 10tトラック</div>
        <div class="vi-meta">タイル 500枚・接着剤 20袋 ／ 東側搬入口</div>
      </div>
      <div class="vi-right">
        <div class="vi-eta" id="eta1">12分</div>
        <div class="vi-status s-moving">走行中</div>
      </div>
    </div>
    <div class="vehicle-item" onclick="focusTruck(2)">
      <div class="vi-avatar waiting"><i class="ti ti-truck"></i></div>
      <div class="vi-info">
        <div class="vi-name">佐藤物流 — 4tトラック</div>
        <div class="vi-meta">足場資材 ／ 南側搬入口 ／ 16:00予定</div>
      </div>
      <div class="vi-right">
        <div class="vi-eta">2時間後</div>
        <div class="vi-status s-waiting">待機中</div>
      </div>
    </div>
  </div>

  <!-- 通知ボタン -->
  <div class="notify-row">
    <button class="noti-btn line" onclick="sendLineNotify()">
      <i class="ti ti-message-circle"></i>LINEで連絡
    </button>
    <button class="noti-btn sms" onclick="sendSmsNotify()">
      <i class="ti ti-device-mobile"></i>SMS
    </button>
    <button class="noti-btn guard" onclick="notifyGuard()">
      <i class="ti ti-shield"></i>ガードマン通知
    </button>
  </div>

</div>

<!-- ドライバー追跡リンク送信画面 -->
<div class="driver-send" id="driver-send">
  <div style="margin-top:20px">
    <div class="ds-title">ドライバーに追跡リンクを送る</div>
    <div class="ds-sub">
      ドライバーがリンクを開くと現在地の共有が始まります。<br>
      現場側はリアルタイムで位置を確認できます。
    </div>
    <button class="ds-btn line" onclick="sendTrackingLink('line')">
      <i class="ti ti-message-circle"></i>LINE で送る
    </button>
    <button class="ds-btn sms" onclick="sendTrackingLink('sms')">
      <i class="ti ti-device-mobile"></i>SMS で送る
    </button>
    <button class="ds-btn primary" onclick="sendTrackingLink('copy')">
      <i class="ti ti-copy"></i>リンクをコピーする
    </button>
    <div class="ds-cancel" onclick="hideDriverSend()">キャンセル</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── ルートライン描画 ────────────────────────────────────────────
function drawRoute() {
  const map = document.getElementById('map');
  const w = map.clientWidth, h = map.clientHeight;
  // 車両1 → 現場のルート（L字）
  const t1 = { x: w*0.20, y: h*0.60 };
  const site = { x: w*0.65, y: h*0.45 };
  const mid  = { x: w*0.20, y: h*0.45 };
  document.getElementById('route-line1').setAttribute('points',
    `${t1.x},${t1.y} ${mid.x},${mid.y} ${site.x},${site.y}`);
  // 車両2のルート（薄く）
  const t2 = { x: w*0.82, y: h*0.75 };
  document.getElementById('route-line2').setAttribute('points',
    `${t2.x},${t2.y} ${t2.x},${h*0.45} ${site.x},${h*0.45}`);
}
drawRoute();
window.addEventListener('resize', drawRoute);

// ── 車両アニメーション（デモ） ──────────────────────────────────
let etaMin = 12;
let truck1X = 20, truck1Y = 60;
const destX = 65, destY = 45;

function animateTruck() {
  const map = document.getElementById('map');
  const w = map.clientWidth, h = map.clientHeight;
  const truck = document.getElementById('truck1');

  // X軸方向に少し移動
  if (truck1X < destX - 2) {
    truck1X += 0.3;
    truck.style.left = truck1X + '%';
  }
  // Y軸方向に少し移動（現場の高さに合わせる）
  if (truck1Y > destY + 2) {
    truck1Y -= 0.2;
    truck.style.top = truck1Y + '%';
  }
  drawRoute();
  setTimeout(animateTruck, 1000);
}
animateTruck();

// ETA カウントダウン
setInterval(() => {
  if (etaMin > 1) {
    etaMin -= 1;
    document.getElementById('eta-countdown').textContent = etaMin;
    document.getElementById('eta1').textContent = etaMin + '分';
    // 到着間近アラート
    if (etaMin === 5) {
      showToast('🚛 山田運輸があと5分で到着します！ガードマンに通知しますか？');
    }
    if (etaMin === 1) {
      document.getElementById('eta1').textContent = 'まもなく';
      document.getElementById('eta-countdown').textContent = '1';
    }
  } else {
    document.getElementById('eta-countdown').textContent = '到着';
    document.getElementById('eta1').textContent = '到着';
    document.querySelector('.vi-status.s-moving').textContent = '到着済み';
    document.querySelector('.vi-status.s-moving').className = 'vi-status s-arrived';
    document.querySelector('.hd-live').innerHTML = '<i class="ti ti-circle-check" style="color:#4ade80"></i><span style="color:#4ade80">到着</span>';
  }
}, 8000); // デモ：8秒ごとに1分経過

// ── 追跡リンク送信 ─────────────────────────────────────────────
// 仕組み：
// 1. Firestoreに trackingSessions/{sessionId} を作成
// 2. ドライバーにURLを送信: https://zaibase.jp/track/{sessionId}
// 3. ドライバーがURLを開くとブラウザのGeolocation APIで位置取得開始
// 4. 位置情報をFirestoreにリアルタイム書き込み
// 5. 現場側はFirestoreのonSnapshot()で受信してマーカーを更新

function sendTrackingLink(method) {
  const sessionId = 'TRK-' + Date.now();
  const url = `https://zaibase.jp/track/${sessionId}`;
  // 送信メッセージ
  const msg = `【Zaibase】搬入追跡リンク\n現場まで走行中に、このリンクを開いてください。現場側でリアルタイム確認できます。\n${url}`;

  if (method === 'line') {
    // window.open(`https://line.me/R/share?text=${encodeURIComponent(msg)}`);
    showToast('LINEでドライバーに追跡リンクを送信します');
  } else if (method === 'sms') {
    // window.open(`sms:?body=${encodeURIComponent(msg)}`);
    showToast('SMSでドライバーに追跡リンクを送信します');
  } else {
    // navigator.clipboard.writeText(url);
    showToast('追跡リンクをコピーしました');
  }
  hideDriverSend();
}

function showDriverSend() { document.getElementById('driver-send').classList.add('show'); }
function hideDriverSend() { document.getElementById('driver-send').classList.remove('show'); }

// ── ドライバー側の位置送信（実装コメント） ─────────────────────
// ドライバーがリンクを開いた時に実行するコード：
//
// navigator.geolocation.watchPosition(pos => {
//   db.collection('trackingSessions').doc(sessionId).set({
//     lat: pos.coords.latitude,
//     lng: pos.coords.longitude,
//     speed: pos.coords.speed,
//     updatedAt: serverTimestamp()
//   }, { merge: true });
// }, null, { enableHighAccuracy: true, maximumAge: 5000 });
//
// 現場側の受信（onSnapshot）：
// db.collection('trackingSessions').doc(sessionId).onSnapshot(doc => {
//   const { lat, lng } = doc.data();
//   updateMarkerPosition(lat, lng);
//   calcETA(lat, lng, siteLat, siteLng);
// });

function focusTruck(id)    { showToast(`車両${id}にフォーカス`); }
function sendLineNotify()  { showToast('LINEでドライバーに連絡します'); }
function sendSmsNotify()   { showToast('SMSでドライバーに連絡します'); }
function notifyGuard()     { showToast('ガードマンに到着予報を通知しました（あと12分）'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  setTimeout(() => t.className = 'toast', 3000);
}
</script>
</body>
</html>
