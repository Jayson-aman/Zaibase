<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zaibase 請求書（デザインアーカイブ）</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <style>
    :root { --zb-navy:#1a3c5e; --zb-bg:#f0f4f8; --zb-card:#fff; --zb-border:#dce3ea; --zb-muted:#6b7c93; --zb-text:#1a2332; }
    body { margin:0; font-family:"Hiragino Sans","Noto Sans JP",sans-serif; background:var(--zb-bg); color:var(--zb-text); }
    .hd { background:var(--zb-navy); padding:13px 16px; color:#fff; font-weight:700; }
    .main { max-width:480px; margin:0 auto; padding:14px; }
    .section { background:var(--zb-card); border:1px solid var(--zb-border); border-radius:14px; padding:16px; margin-bottom:12px; }
    label { display:block; font-size:12px; color:var(--zb-muted); margin-bottom:4px; }
    input, select, textarea { width:100%; height:42px; border:1px solid var(--zb-border); border-radius:8px; padding:0 11px; font-size:14px; box-sizing:border-box; }
    textarea { height:64px; padding:9px 11px; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .field { margin-bottom:12px; }
    .btn { width:100%; padding:13px; border:none; border-radius:10px; background:var(--zb-navy); color:#fff; font-weight:700; cursor:pointer; margin-top:8px; }
    .note { font-size:11px; color:var(--zb-muted); margin-top:16px; line-height:1.6; }
  </style>
</head>
<body>
  <header class="hd">請求書（適格請求書）</header>
  <main class="main">
    <div class="section">
      <div class="field"><label>事業者名</label><input id="f-issuer-name" placeholder="株式会社〇〇工務店"></div>
      <div class="field"><label>所在地</label><input id="f-issuer-addr"></div>
      <div class="field"><label>登録番号（T+13桁）</label><input id="f-inv-no" placeholder="T1234567890123"></div>
    </div>
    <div class="section">
      <div class="field"><label>宛先</label><input id="f-client-name"></div>
      <div class="row2">
        <div class="field"><label>発行日</label><input type="date" id="f-issue-date"></div>
        <div class="field"><label>支払期日</label><input type="date" id="f-due-date"></div>
      </div>
    </div>
    <div class="section">
      <div class="field"><label>振込先（銀行名）</label><input id="bk-bank"></div>
    </div>
    <button class="btn" type="button" onclick="alert('Zaibase.html の invoiceScreen + generateInvoicePdf Callable に統合済み')">PDF生成（統合先参照）</button>
    <p class="note">本ファイルはデザインアーカイブです。実装は frontend/Zaibase.html の #invoiceScreen と Cloud Functions generateInvoicePdf を参照してください。</p>
  </main>
</body>
</html>
